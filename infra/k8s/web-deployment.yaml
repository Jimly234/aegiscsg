apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-web
  namespace: aegis
  labels:
    app: aegis-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aegis-web
  template:
    metadata:
      labels:
        app: aegis-web
    spec:
      containers:
        - name: web
          image: aegis/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.aegis.ng"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-web
  namespace: aegis
spec:
  selector:
    app: aegis-web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-web-ingress
  namespace: aegis
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - aegis.ng
        - www.aegis.ng
      secretName: aegis-web-tls
  rules:
    - host: aegis.ng
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-web
                port:
                  number: 80
